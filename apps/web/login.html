<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoShop SMS AI — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/brand-tokens.css">
<style>
  :root {
    /* Aliases → shared brand-tokens.css */
    --rust:       var(--color-primary);
    --rust-light: var(--color-primary-hover);
    --text:       var(--color-text-primary);
    --text-secondary: var(--color-text-secondary);
    --text-tertiary:  var(--color-text-tertiary);
    --bg:         var(--color-bg-page);
    --bg-card:    var(--color-bg-surface);
    --bg-input:   var(--color-bg-surface-alt);
    --border:     var(--color-border);
    --border-mid: var(--color-border-strong);
    --mono:       var(--font-mono);
    --display:    var(--font-display);
    --body:       var(--font-body);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: linear-gradient(160deg, #FAF8F5 0%, #F3EDE5 50%, #FAF8F5 100%);
    color: var(--text);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  .topnav {
    background: rgba(255,255,255,0.85);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
  }
  .nav-logo span { color: var(--rust); }
  .nav-back {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-tertiary);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--text); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 48px 40px;
    border-radius: 16px;
    box-shadow: var(--shadow-card);
  }

  .card-tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rust-light);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .card-tag::before {
    content: '';
    display: block;
    width: 6px; height: 6px;
    background: var(--rust);
    border-radius: 50%;
  }

  h1 {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 8px;
    color: var(--text);
  }
  .sub {
    color: var(--text-tertiary);
    font-size: 15px;
    margin-bottom: 32px;
  }

  /* ── Google button ── */
  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #fff;
    color: #1a1a1a;
    font-family: var(--body);
    font-size: 15px;
    font-weight: 600;
    padding: 13px 24px;
    border: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .btn-google:hover { background: #FAFAFA; border-color: var(--border-mid); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0 24px;
    color: var(--text-tertiary);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Form ── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 7px;
  }
  .form-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--body);
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    border-radius: 10px;
  }
  .form-input:focus { border-color: var(--rust); box-shadow: var(--shadow-focus-primary); }
  .form-input::placeholder { color: var(--text-tertiary); opacity: 0.7; }

  .password-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 7px;
  }
  .forgot-link {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: var(--rust-light); }

  .btn-primary {
    display: block;
    width: 100%;
    background: var(--rust);
    color: #fff;
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 16px 32px;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    border-radius: 10px;
    margin-top: 8px;
    box-shadow: var(--shadow-primary);
  }
  .btn-primary:hover { background: var(--rust-light); transform: translateY(-1px); box-shadow: var(--shadow-primary-hover); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  .error-msg {
    display: none;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.2);
    color: #DC2626;
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 16px;
    margin-bottom: 20px;
    border-radius: 8px;
  }
  .error-msg.visible { display: block; }

  .signup-link {
    margin-top: 28px;
    text-align: center;
    font-size: 14px;
    color: var(--text-tertiary);
  }
  .signup-link a {
    color: var(--rust);
    text-decoration: none;
    border-bottom: 1px solid rgba(201,75,31,0.2);
    padding-bottom: 1px;
    transition: border-color 0.2s;
  }
  .signup-link a:hover { border-color: var(--rust); }

  .demo-link {
    margin-top: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--text-tertiary);
    opacity: 0.7;
  }
  .demo-link a {
    color: var(--text-tertiary);
    text-decoration: none;
    border-bottom: 1px dashed var(--border-mid);
    cursor: pointer;
  }
  .demo-link a:hover { color: var(--text-secondary); }

  /* ── FOOTER ── */
  .page-footer {
    padding: 24px 32px;
    text-align: center;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-tertiary);
  }
  .page-footer a { color: var(--text-tertiary); text-decoration: none; }
  .page-footer a:hover { color: var(--text); }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="nav-logo">AutoShop <span>SMS</span> AI</a>
  <a href="/" class="nav-back">← Back to site</a>
</nav>

<main class="main">
  <div class="card">
    <div class="card-tag">Shop Portal</div>
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to your shop dashboard.</p>

    <div class="error-msg" id="errorMsg"></div>

    <!-- Google Sign-In -->
    <button type="button" class="btn-google" onclick="startGoogleLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or sign in with email</div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@yourshop.com"
          autocomplete="email"
          required
        >
      </div>
      <div class="form-group">
        <div class="password-row">
          <label class="form-label" for="password" style="margin-bottom:0">Password</label>
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">
        Sign In →
      </button>
    </form>

    <div class="signup-link">
      New to AutoShop SMS AI?
      <a href="/signup">Start your free trial →</a>
    </div>

    <div class="demo-link">
      <a onclick="fillDemoCredentials()" tabindex="0">Use demo account</a>
    </div>
  </div>
</main>

<footer class="page-footer">
  &copy; 2026 AutoShop SMS AI &nbsp;·&nbsp;
  <a href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp;
  <a href="terms.html">Terms of Service</a> &nbsp;·&nbsp;
  <a href="mailto:hello@autoshopsmsai.com">Contact</a>
</footer>

<script>
// ── Return-to-target helper ──────────────────────────────────────────────────
var ALLOWED_NEXT = { '/app/dashboard': true, '/app/conversations': true, '/app/appointments': true, '/app/settings': true, '/app/billing': true, '/app/analytics': true, '/app/customers': true, 'admin.html': true };
function getNextTarget() {
  var param = new URLSearchParams(window.location.search).get('next') || '';
  return ALLOWED_NEXT[param] ? param : '/app/dashboard';
}

// ── Auth check ──────────────────────────────────────────────────────────────
(function() {
  var token = localStorage.getItem('autoshop_jwt');
  if (!token) return;
  fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(res) {
      if (res.ok) window.location.replace(getNextTarget());
    })
    .catch(function() { /* network error — stay on login */ });
})();

// ── Show error from URL query param (e.g. Google OAuth failure) ──────────────
(function() {
  var params = new URLSearchParams(window.location.search);
  var err = params.get('error');
  if (err) showError(decodeURIComponent(err).replace(/_/g, ' '));
})();

// ── Google Sign-In ──────────────────────────────────────────────────────────
function startGoogleLogin() {
  window.location.href = '/auth/google/login/start';
}

// ── Handle Google login callback (one-time auth code exchange) ───────────────
(function() {
  var params = new URLSearchParams(window.location.search);
  var googleCode = params.get('google_code');
  if (googleCode) {
    // Clean the code from the URL immediately (prevent leakage via history/referrer)
    window.history.replaceState({}, '', '/login');
    // Exchange the one-time code for JWT via POST (token never in URL)
    fetch('/auth/google/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: googleCode })
    })
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
      if (result.ok && result.data.token) {
        localStorage.setItem('autoshop_jwt', result.data.token);
        localStorage.setItem('autoshop_session', JSON.stringify({
          email: result.data.email || '',
          tenantId: result.data.tenantId || '',
          shopName: result.data.shopName || '',
          loginAt: Date.now()
        }));
        if (result.data.shopName) localStorage.setItem('tenant_name', result.data.shopName);
        window.location.replace('/app/dashboard');
      } else {
        showError(result.data.error || 'Google sign-in failed. Please try again.');
      }
    })
    .catch(function() {
      showError('Unable to complete Google sign-in. Please try again.');
    });
    return;
  }
})();

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function fillDemoCredentials() {
  document.getElementById('email').value = 'dev@autoshop.local';
  document.getElementById('password').value = 'devpass2026';
  document.getElementById('errorMsg').classList.remove('visible');
}

async function handleLogin(e) {
  e.preventDefault();
  var email     = document.getElementById('email').value.trim().toLowerCase();
  var password  = document.getElementById('password').value;
  var errorEl   = document.getElementById('errorMsg');
  var submitBtn = document.getElementById('submitBtn');

  errorEl.classList.remove('visible');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing In…';

  try {
    var res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    var data = await res.json();

    if (res.ok && data.token) {
      localStorage.setItem('autoshop_jwt', data.token);
      localStorage.setItem('autoshop_session', JSON.stringify({
        email:    email,
        tenantId: data.tenantId,
        shopName: data.shopName,
        loginAt:  Date.now()
      }));
      if (data.shopName) localStorage.setItem('tenant_name', data.shopName);
      window.location.replace(getNextTarget());
    } else {
      showError(data.error || 'Invalid email or password. Please check your credentials and try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In →';
    }
  } catch (err) {
    showError('Unable to connect. Please check your internet connection and try again.');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign In →';
  }
}
</script>
</body>
</html>
