<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoShop SMS AI — Set New Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand-tokens.css">
<style>
  :root {
    /* Aliases → shared brand-tokens.css */
    --rust:       var(--color-primary);
    --rust-light: var(--color-primary-hover);
    --text:       var(--color-text-primary);
    --text-secondary: var(--color-text-secondary);
    --text-tertiary:  var(--color-text-tertiary);
    --bg:         var(--color-bg-page);
    --bg-card:    var(--color-bg-surface);
    --bg-input:   var(--color-bg-surface-alt);
    --border:     var(--color-border);
    --border-mid: var(--color-border-strong);
    --mono:       var(--font-mono);
    --display:    var(--font-display);
    --body:       var(--font-body);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: linear-gradient(160deg, #FAF8F5 0%, #F3EDE5 50%, #FAF8F5 100%);
    color: var(--text);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  .topnav {
    background: rgba(255,255,255,0.85);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
  }
  .nav-logo span { color: var(--rust); }
  .nav-back {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-tertiary);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--text); }

  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 48px 40px;
    border-radius: 16px;
    box-shadow: var(--shadow-card);
  }

  .card-tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rust-light);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .card-tag::before {
    content: '';
    display: block;
    width: 6px; height: 6px;
    background: var(--rust);
    border-radius: 50%;
  }

  h1 {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 8px;
    color: var(--text);
  }
  .sub {
    color: var(--text-tertiary);
    font-size: 15px;
    margin-bottom: 32px;
  }

  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 7px;
  }
  .form-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--body);
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    border-radius: 10px;
  }
  .form-input:focus { border-color: var(--rust); box-shadow: var(--shadow-focus-primary); }
  .form-input::placeholder { color: var(--text-tertiary); opacity: 0.7; }

  .btn-primary {
    display: block;
    width: 100%;
    background: var(--rust);
    color: #fff;
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 16px 32px;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    border-radius: 10px;
    margin-top: 8px;
    box-shadow: var(--shadow-primary);
  }
  .btn-primary:hover { background: var(--rust-light); transform: translateY(-1px); box-shadow: var(--shadow-primary-hover); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  .status-msg {
    display: none;
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 16px;
    margin-bottom: 20px;
    border-radius: 8px;
  }
  .status-msg.error {
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.2);
    color: #DC2626;
  }
  .status-msg.success {
    background: rgba(34,197,94,0.06);
    border: 1px solid rgba(34,197,94,0.2);
    color: #15803D;
  }
  .status-msg.visible { display: block; }

  .back-link {
    margin-top: 28px;
    text-align: center;
    font-size: 14px;
    color: var(--text-tertiary);
  }
  .back-link a {
    color: var(--rust);
    text-decoration: none;
    border-bottom: 1px solid rgba(201,75,31,0.2);
    padding-bottom: 1px;
    transition: border-color 0.2s;
  }
  .back-link a:hover { border-color: var(--rust); }

  .page-footer {
    padding: 24px 32px;
    text-align: center;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-tertiary);
  }
  .page-footer a { color: var(--text-tertiary); text-decoration: none; }
  .page-footer a:hover { color: var(--text); }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="nav-logo">AutoShop <span>SMS</span> AI</a>
  <a href="/login" class="nav-back">&larr; Back to sign in</a>
</nav>

<main class="main">
  <div class="card">
    <div class="card-tag">Account Recovery</div>
    <h1>Set New Password</h1>
    <p class="sub">Enter your new password below.</p>

    <div class="status-msg" id="statusMsg"></div>

    <form id="resetForm" onsubmit="handleSetPassword(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="Min 8 characters"
          autocomplete="new-password"
          minlength="8"
          required
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm">Confirm Password</label>
        <input
          class="form-input"
          type="password"
          id="confirm"
          name="confirm"
          placeholder="Re-enter password"
          autocomplete="new-password"
          minlength="8"
          required
        >
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">
        Reset Password &rarr;
      </button>
    </form>

    <div class="back-link">
      <a href="/login">Back to sign in &rarr;</a>
    </div>
  </div>
</main>

<footer class="page-footer">
  &copy; 2026 AutoShop SMS AI &nbsp;&middot;&nbsp;
  <a href="privacy.html">Privacy Policy</a> &nbsp;&middot;&nbsp;
  <a href="terms.html">Terms of Service</a> &nbsp;&middot;&nbsp;
  <a href="mailto:hello@autoshopsmsai.com">Contact</a>
</footer>

<script>
// Extract token from URL
var resetToken = new URLSearchParams(window.location.search).get('token');

// If no token in URL, show error immediately
if (!resetToken) {
  (function() {
    var statusEl = document.getElementById('statusMsg');
    statusEl.textContent = 'Invalid reset link. Please request a new password reset.';
    statusEl.classList.add('visible', 'error');
    document.getElementById('resetForm').style.display = 'none';
  })();
}

async function handleSetPassword(e) {
  e.preventDefault();
  var password  = document.getElementById('password').value;
  var confirm   = document.getElementById('confirm').value;
  var statusEl  = document.getElementById('statusMsg');
  var submitBtn = document.getElementById('submitBtn');

  statusEl.classList.remove('visible', 'error', 'success');

  if (!password || password.length < 8) {
    statusEl.textContent = 'Password must be at least 8 characters.';
    statusEl.classList.add('visible', 'error');
    return;
  }

  if (password !== confirm) {
    statusEl.textContent = 'Passwords do not match.';
    statusEl.classList.add('visible', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Resetting\u2026';

  try {
    var res = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: password })
    });
    var data = await res.json();

    if (res.ok) {
      statusEl.textContent = data.message || 'Password has been reset successfully.';
      statusEl.classList.add('visible', 'success');
      document.getElementById('resetForm').style.display = 'none';
      // Auto-redirect to login after 3 seconds
      setTimeout(function() { window.location.href = '/login'; }, 3000);
    } else {
      statusEl.textContent = data.error || 'Failed to reset password. Please try again.';
      statusEl.classList.add('visible', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password \u2192';
    }
  } catch (err) {
    statusEl.textContent = 'Unable to connect. Please check your internet connection and try again.';
    statusEl.classList.add('visible', 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Reset Password \u2192';
  }
}
</script>
</body>
</html>
