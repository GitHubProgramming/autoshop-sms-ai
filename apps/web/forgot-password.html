<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoShop SMS AI — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0D1B2A;
    --navy-mid:   #162336;
    --navy-light: #1E3048;
    --rust:       #C94B1F;
    --rust-light: #E05A2B;
    --steel:      #94A3B8;
    --steel-light:#CBD5E1;
    --white:      #F8F9FA;
    --border:     rgba(148,163,184,0.15);
    --border-mid: rgba(148,163,184,0.25);
    --mono:       'IBM Plex Mono', monospace;
    --display:    'Barlow Condensed', sans-serif;
    --body:       'Barlow', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }
  .topnav {
    background: rgba(13,27,42,0.9);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .nav-logo {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo span { color: var(--rust); }
  .nav-back {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--steel);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--white); }
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--navy-mid);
    border: 1px solid var(--border-mid);
    padding: 48px 40px;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }
  .card-tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rust-light);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .card-tag::before {
    content: '';
    display: block;
    width: 6px; height: 6px;
    background: var(--rust);
    border-radius: 50%;
  }
  h1 {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 8px;
  }
  .sub {
    color: var(--steel);
    font-size: 15px;
    margin-bottom: 32px;
  }
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--steel);
    margin-bottom: 7px;
  }
  .form-input {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--border-mid);
    color: var(--white);
    font-family: var(--body);
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }
  .form-input:focus { border-color: var(--rust); }
  .form-input::placeholder { color: var(--steel); opacity: 0.6; }
  .btn-primary {
    display: block;
    width: 100%;
    background: var(--rust);
    color: var(--white);
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 16px 32px;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s, transform 0.15s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    margin-top: 8px;
  }
  .btn-primary:hover { background: var(--rust-light); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .status-msg {
    display: none;
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .status-msg.error {
    background: rgba(239,68,68,0.10);
    border: 1px solid rgba(239,68,68,0.3);
    color: #FCA5A5;
  }
  .status-msg.success {
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    color: #86EFAC;
  }
  .status-msg.visible { display: block; }
  .back-link {
    margin-top: 28px;
    text-align: center;
    font-size: 14px;
    color: var(--steel);
  }
  .back-link a {
    color: var(--steel-light);
    text-decoration: none;
    border-bottom: 1px solid var(--border-mid);
    padding-bottom: 1px;
  }
  .back-link a:hover { color: var(--white); }
  .page-footer {
    padding: 24px 32px;
    text-align: center;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--steel);
  }
  .page-footer a { color: var(--steel); text-decoration: none; }
  .page-footer a:hover { color: var(--white); }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="nav-logo">AutoShop <span>SMS</span> AI</a>
  <a href="/login" class="nav-back">← Back to sign in</a>
</nav>

<main class="main">
  <div class="card">
    <div class="card-tag">Account Recovery</div>
    <h1>Reset Password</h1>
    <p class="sub">Enter your email and we'll send you a link to reset your password.</p>

    <div class="status-msg" id="statusMsg"></div>

    <form id="resetForm" onsubmit="handleReset(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@yourshop.com"
          autocomplete="email"
          required
        >
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">
        Send Reset Link →
      </button>
    </form>

    <div class="back-link">
      Remember your password?
      <a href="/login">Sign in →</a>
    </div>
  </div>
</main>

<footer class="page-footer">
  &copy; 2026 AutoShop SMS AI &nbsp;·&nbsp;
  <a href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp;
  <a href="terms.html">Terms of Service</a> &nbsp;·&nbsp;
  <a href="mailto:hello@autoshopsmsai.com">Contact</a>
</footer>

<script>
// TODO: Wire to backend password reset endpoint when available.
// Currently shows a confirmation message regardless of whether the email exists,
// which is the correct UX pattern (prevents email enumeration).
async function handleReset(e) {
  e.preventDefault();
  var email     = document.getElementById('email').value.trim().toLowerCase();
  var statusEl  = document.getElementById('statusMsg');
  var submitBtn = document.getElementById('submitBtn');

  statusEl.classList.remove('visible', 'error', 'success');

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    statusEl.textContent = 'Please enter a valid email address.';
    statusEl.classList.add('visible', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending…';

  // TODO: Replace with actual API call when /auth/reset-password endpoint exists
  // try {
  //   var res = await fetch('/auth/reset-password', {
  //     method: 'POST',
  //     headers: { 'Content-Type': 'application/json' },
  //     body: JSON.stringify({ email: email })
  //   });
  // } catch (err) {}

  // For now, show confirmation message after brief delay
  setTimeout(function() {
    statusEl.textContent = 'If an account exists with that email, you will receive a password reset link shortly.';
    statusEl.classList.add('visible', 'success');
    document.getElementById('resetForm').querySelector('.form-group').style.display = 'none';
    submitBtn.style.display = 'none';
  }, 800);
}
</script>
</body>
</html>
