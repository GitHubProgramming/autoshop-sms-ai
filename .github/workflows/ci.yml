name: CI

on:
  push:
    branches:
      - main
      - ai/**
  pull_request:
    branches:
      - main

jobs:
  api-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd apps/api
          npm ci

      - name: Check project status drift
        run: bash scripts/check-status-drift.sh

      - name: Lint
        run: |
          cd apps/api
          npm run lint --if-present || true

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Test
        run: |
          cd apps/api
          npm test --if-present
        env:
          DATABASE_URL: postgresql://localhost/ci_test
          NODE_ENV: test
