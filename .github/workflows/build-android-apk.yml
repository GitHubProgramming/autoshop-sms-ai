name: Build Android APK

on:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        working-directory: android-app
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Print signing info
        working-directory: android-app
        run: ./gradlew signingReport --no-daemon 2>&1 | grep -A 5 "SHA1\|SHA-1\|Variant\|Config"

      - name: Build debug APK
        working-directory: android-app
        env:
          DEFAULT_API_KEY: ${{ secrets.DEFAULT_API_KEY }}
          DEFAULT_CALENDAR_ID: ${{ secrets.DEFAULT_CALENDAR_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProterosServisas-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
