name: Build Android APK

on:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        working-directory: android-app
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Print signing info
        working-directory: android-app
        run: ./gradlew signingReport --no-daemon 2>&1 | grep -A 5 "SHA1\|SHA-1\|Variant\|Config"

      - name: Run unit tests
        working-directory: android-app
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        working-directory: android-app
        env:
          DEFAULT_API_KEY: ${{ secrets.DEFAULT_API_KEY }}
          DEFAULT_CALENDAR_ID: ${{ secrets.DEFAULT_CALENDAR_ID }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          RUN=${{ github.run_number }}
          VERSION="$(( RUN / 100 )).$(printf '%02d' $(( RUN % 100 )))"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          cp android-app/app/build/outputs/apk/debug/app-debug.apk "android-app/app/build/outputs/apk/debug/ProterosServisas-v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProterosServisas-v${{ env.APP_VERSION }}
          path: android-app/app/build/outputs/apk/debug/ProterosServisas-v${{ env.APP_VERSION }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          files: android-app/app/build/outputs/apk/debug/ProterosServisas-v${{ env.APP_VERSION }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
