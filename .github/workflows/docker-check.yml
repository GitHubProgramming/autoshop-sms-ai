name: Docker Smoke Test

on:
  pull_request:
    branches:
      - main

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          printf '%s\n' \
            'JWT_SECRET=ci_smoke_test_jwt_secret_not_for_production' \
            'OPENAI_API_KEY=sk-ci-placeholder' \
            'TWILIO_ACCOUNT_SID=AC_ci_placeholder' \
            'TWILIO_AUTH_TOKEN=ci_placeholder_token' \
            > .env

      - name: Build containers
        run: docker compose -f infra/docker-compose.yml build

      - name: Start stack
        run: docker compose -f infra/docker-compose.yml up -d

      - name: Wait for API healthy
        run: timeout 90 bash -c 'until curl -sf http://localhost:3000/health; do sleep 3; done'

      - name: Health check
        run: curl -f http://localhost:3000/health
