server {
    listen 8080;

    # Serve apps/web/ static files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API routes to the API container
    location /auth/ {
        proxy_pass http://api:3000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://api:3000/health;
        proxy_set_header Host $host;
    }

    location /webhooks/ {
        proxy_pass http://api:3000/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /internal/ {
        proxy_pass http://api:3000/internal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /billing/ {
        proxy_pass http://api:3000/billing/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static HTML fallback
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
